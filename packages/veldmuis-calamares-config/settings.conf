---
modules-search: [ local ]

instances:
  - id: veldmuis-bootstrap
    module: shellprocess
    config: veldmuis-bootstrap.conf
    weight: 40
  - id: graphics
    module: packagechooser
    config: graphics.conf

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - packagechooser@graphics
      - users
      - summary
  - exec:
      - partition
      - mount
      - shellprocess@veldmuis-bootstrap
      - packages
      - machineid
      - locale
      - keyboard
      - localecfg
      - fstab
      - initcpiocfg
      - initcpio
      - users
      - displaymanager
      - networkcfg
      - hwclock
      - services-systemd
      - bootloader
      - umount
  - show:
      - finished

branding: veldmuis
prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true
hide-back-and-next-during-exec: false
quit-at-end: false
