---
dontChroot: true
timeout: 7200
verbose: true

script:
  - command: "/bin/sh -c '/usr/lib/veldmuis/veldmuis-calamares-bootstrap.sh \"${ROOT}\" \"${gs[packagechooser_graphics]}\" || { [ -f /tmp/veldmuis-calamares-bootstrap.log ] && cat /tmp/veldmuis-calamares-bootstrap.log >&2; exit 1; }'"
    timeout: 7200
    verbose: true

i18n:
  name: "Bootstrap Veldmuis system"
