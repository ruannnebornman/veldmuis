name: Build ISO

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    defaults:
      run:
        shell: bash
    env:
      BUILDER_USER: builder
      BUILDER_HOME: /home/builder
      GNUPGHOME: /home/builder/.gnupg
      VELDMUIS_KEY_FPR_FILE: /home/builder/current-signing-key.fpr
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare Arch build environment
        run: |
          pacman -Syu --noconfirm --needed \
            archlinux-keyring \
            archiso \
            base-devel \
            boost \
            boost-libs \
            cmake \
            extra-cmake-modules \
            git \
            gnupg \
            hwinfo \
            kcoreaddons \
            kcrash \
            kdbusaddons \
            kglobalaccel \
            kirigami \
            kpmcore \
            libpwquality \
            pacman-contrib \
            polkit-qt6 \
            python \
            qt6-declarative \
            qt6-svg \
            qt6-tools \
            qt6-translations \
            rsync \
            squashfs-tools \
            yaml-cpp
          if ! id -u "${BUILDER_USER}" >/dev/null 2>&1; then
            useradd -m -U -s /bin/bash "${BUILDER_USER}"
          fi
          chown -R "${BUILDER_USER}:${BUILDER_USER}" "${GITHUB_WORKSPACE}"
          install -d -m 700 -o "${BUILDER_USER}" -g "${BUILDER_USER}" "${GNUPGHOME}"

      - name: Import signing key
        env:
          VELDMUIS_GPG_PRIVATE_KEY: ${{ secrets.VELDMUIS_GPG_PRIVATE_KEY }}
          VELDMUIS_GPG_FPR: ${{ secrets.VELDMUIS_GPG_FPR }}
          VELDMUIS_GPG_PASSPHRASE: ${{ secrets.VELDMUIS_GPG_PASSPHRASE }}
        run: |
          key_file="${RUNNER_TEMP}/veldmuis-ci-signing-subkey.asc"
          passphrase_file="${RUNNER_TEMP}/veldmuis-gpg-passphrase"
          printf '%s\n' "${VELDMUIS_GPG_PRIVATE_KEY}" > "${key_file}"
          chown "${BUILDER_USER}:${BUILDER_USER}" "${key_file}"
          su "${BUILDER_USER}" -c "GNUPGHOME='${GNUPGHOME}' gpg --batch --import '${key_file}'"
          printf '%s\n' "${VELDMUIS_GPG_FPR}" > "${VELDMUIS_KEY_FPR_FILE}"
          chown "${BUILDER_USER}:${BUILDER_USER}" "${VELDMUIS_KEY_FPR_FILE}"
          if [[ -n "${VELDMUIS_GPG_PASSPHRASE}" ]]; then
            printf '%s\n' "${VELDMUIS_GPG_PASSPHRASE}" > "${passphrase_file}"
            chmod 600 "${passphrase_file}"
            chown "${BUILDER_USER}:${BUILDER_USER}" "${passphrase_file}"
            echo "VELDMUIS_GPG_PASSPHRASE_FILE=${passphrase_file}" >> "${GITHUB_ENV}"
          fi
          su "${BUILDER_USER}" -c "GNUPGHOME='${GNUPGHOME}' gpg --batch --list-secret-keys '${VELDMUIS_GPG_FPR}'"
          rm -f "${key_file}"

      - name: Build all packages
        run: |
          su "${BUILDER_USER}" -c "cd '${GITHUB_WORKSPACE}' && GNUPGHOME='${GNUPGHOME}' ./scripts/build-all-packages.sh"

      - name: Build local repo
        run: |
          passphrase_env=""
          if [[ -n "${VELDMUIS_GPG_PASSPHRASE_FILE:-}" ]]; then
            passphrase_env="VELDMUIS_GPG_PASSPHRASE_FILE='${VELDMUIS_GPG_PASSPHRASE_FILE}'"
          fi
          su "${BUILDER_USER}" -c "cd '${GITHUB_WORKSPACE}' && GNUPGHOME='${GNUPGHOME}' VELDMUIS_KEY_FPR_FILE='${VELDMUIS_KEY_FPR_FILE}' ${passphrase_env} ./scripts/build-local-repo.sh"

      - name: Build ISO
        run: ./scripts/build-archiso.sh

      - name: Generate checksum
        id: artifact_prep
        run: |
          latest_iso="$(find build/archiso/out -maxdepth 1 -type f -name 'veldmuis-*.iso' | sort | tail -n 1)"
          [[ -n "${latest_iso}" ]] || {
            echo "No ISO found under build/archiso/out" >&2
            exit 1
          }
          sha256sum "${latest_iso}" > "${latest_iso}.sha256"
          echo "iso_path=${latest_iso}" >> "${GITHUB_OUTPUT}"
          echo "sha_path=${latest_iso}.sha256" >> "${GITHUB_OUTPUT}"
          echo "artifact_name=veldmuis-iso-${GITHUB_RUN_NUMBER}" >> "${GITHUB_OUTPUT}"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_prep.outputs.artifact_name }}
          path: |
            ${{ steps.artifact_prep.outputs.iso_path }}
            ${{ steps.artifact_prep.outputs.sha_path }}
          if-no-files-found: error
          retention-days: 14
