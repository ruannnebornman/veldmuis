name: Build ISO

on:
  workflow_dispatch:
  push:
    branches:
      - ci/github-actions-iso-build

permissions:
  contents: read

jobs:
  build-iso:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    env:
      BUILDER_USER: builder
      BUILDER_HOME: /home/builder
      GNUPGHOME: /home/builder/.gnupg
      VELDMUIS_KEY_FPR_FILE: /home/builder/current-signing-key.fpr
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build packages, repos, and ISO in privileged Arch container
        env:
          VELDMUIS_GPG_PRIVATE_KEY: ${{ secrets.VELDMUIS_GPG_PRIVATE_KEY }}
          VELDMUIS_GPG_FPR: ${{ secrets.VELDMUIS_GPG_FPR }}
          VELDMUIS_GPG_PASSPHRASE: ${{ secrets.VELDMUIS_GPG_PASSPHRASE }}
        run: |
          docker run --rm --privileged \
            -e BUILDER_USER \
            -e BUILDER_HOME \
            -e GNUPGHOME \
            -e VELDMUIS_KEY_FPR_FILE \
            -e VELDMUIS_GPG_PRIVATE_KEY \
            -e VELDMUIS_GPG_FPR \
            -e VELDMUIS_GPG_PASSPHRASE \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v "${RUNNER_TEMP}:/runner-temp" \
            -w /workspace \
            archlinux:base-devel \
            bash -s <<'EOF'
          set -euo pipefail

          pacman -Syu --noconfirm --needed \
            archlinux-keyring \
            archiso \
            base-devel \
            boost \
            boost-libs \
            cmake \
            extra-cmake-modules \
            git \
            gnupg \
            hwinfo \
            kcoreaddons \
            kcrash \
            kdbusaddons \
            kglobalaccel \
            kirigami \
            kpmcore \
            libpwquality \
            pacman-contrib \
            polkit-qt6 \
            python \
            qt6-declarative \
            qt6-svg \
            qt6-tools \
            qt6-translations \
            rsync \
            squashfs-tools \
            yaml-cpp

          if ! id -u "${BUILDER_USER}" >/dev/null 2>&1; then
            useradd -m -u "${HOST_UID}" -s /bin/bash "${BUILDER_USER}"
          fi

          install -d -m 700 -o "${BUILDER_USER}" -g "${BUILDER_USER}" "${GNUPGHOME}"

          key_file="/runner-temp/veldmuis-ci-signing-subkey.asc"
          printf '%s\n' "${VELDMUIS_GPG_PRIVATE_KEY}" > "${key_file}"
          chown "${BUILDER_USER}:${BUILDER_USER}" "${key_file}"
          su "${BUILDER_USER}" -c "GNUPGHOME='${GNUPGHOME}' gpg --batch --import '${key_file}'"

          printf '%s\n' "${VELDMUIS_GPG_FPR}" > "${VELDMUIS_KEY_FPR_FILE}"
          chown "${BUILDER_USER}:${BUILDER_USER}" "${VELDMUIS_KEY_FPR_FILE}"

          if [[ -n "${VELDMUIS_GPG_PASSPHRASE:-}" ]]; then
            export VELDMUIS_GPG_PASSPHRASE_FILE="/runner-temp/veldmuis-gpg-passphrase"
            printf '%s\n' "${VELDMUIS_GPG_PASSPHRASE}" > "${VELDMUIS_GPG_PASSPHRASE_FILE}"
            chmod 600 "${VELDMUIS_GPG_PASSPHRASE_FILE}"
            chown "${BUILDER_USER}:${BUILDER_USER}" "${VELDMUIS_GPG_PASSPHRASE_FILE}"
          fi

          su "${BUILDER_USER}" -c "GNUPGHOME='${GNUPGHOME}' gpg --batch --list-secret-keys '${VELDMUIS_GPG_FPR}'"
          rm -f "${key_file}"

          su "${BUILDER_USER}" -c "cd /workspace && GNUPGHOME='${GNUPGHOME}' ./scripts/build-all-packages.sh"

          repo_cmd="cd /workspace && GNUPGHOME='${GNUPGHOME}' VELDMUIS_KEY_FPR_FILE='${VELDMUIS_KEY_FPR_FILE}'"
          if [[ -n "${VELDMUIS_GPG_PASSPHRASE_FILE:-}" ]]; then
            repo_cmd+=" VELDMUIS_GPG_PASSPHRASE_FILE='${VELDMUIS_GPG_PASSPHRASE_FILE}'"
          fi
          repo_cmd+=" ./scripts/build-local-repo.sh"
          su "${BUILDER_USER}" -c "${repo_cmd}"

          ./scripts/build-archiso.sh

          chown -R "${HOST_UID}:${HOST_GID}" /workspace/build /workspace/repos /workspace/packages
          EOF

      - name: Generate checksum
        id: artifact_prep
        run: |
          latest_iso="$(find build/archiso/out -maxdepth 1 -type f -name 'veldmuis-*.iso' | sort | tail -n 1)"
          [[ -n "${latest_iso}" ]] || {
            echo "No ISO found under build/archiso/out" >&2
            exit 1
          }
          sha256sum "${latest_iso}" > "${latest_iso}.sha256"
          echo "iso_path=${latest_iso}" >> "${GITHUB_OUTPUT}"
          echo "sha_path=${latest_iso}.sha256" >> "${GITHUB_OUTPUT}"
          echo "artifact_name=veldmuis-iso-${GITHUB_RUN_NUMBER}" >> "${GITHUB_OUTPUT}"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_prep.outputs.artifact_name }}
          path: |
            ${{ steps.artifact_prep.outputs.iso_path }}
            ${{ steps.artifact_prep.outputs.sha_path }}
          if-no-files-found: error
          retention-days: 14
