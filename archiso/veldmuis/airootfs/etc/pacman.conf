#
# /etc/pacman.conf
#
# Live ISO pacman configuration.
# This intentionally follows Arch's releng pattern by not setting DownloadUser,
# because pacstrap and the installer bootstrap need to initialize and write keyrings in the
# target root during installation.
#

[options]
HoldPkg     = pacman glibc
Architecture = auto
ParallelDownloads = 5
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist
